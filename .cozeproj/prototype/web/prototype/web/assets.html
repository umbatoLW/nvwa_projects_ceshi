  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23141414"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central" fill="%233B82F6">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%23888888" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

  <script>
    $(function() {
      // Tab切换
      $('.tab-btn').on('click', function() {
        $('.tab-btn').removeClass('text-primary border-primary').addClass('text-on-surface-variant border-transparent');
        $(this).removeClass('text-on-surface-variant border-transparent').addClass('text-primary border-primary');
        filterAssets();
      });

      // 标签筛选
      $('.tag-btn').on('click', function() {
        $(this).toggleClass('bg-primary text-on-primary bg-surface-container text-on-surface-variant');
        filterAssets();
      });

      // 搜索过滤
      $('#search-input').on('input', function() {
        filterAssets();
      });

      // 视图切换
      $('#btn-grid-view').on('click', function() {
        $(this).addClass('text-primary bg-surface-container-high').removeClass('text-on-surface-variant');
        $('#btn-list-view').removeClass('text-primary bg-surface-container-high').addClass('text-on-surface-variant');
        $('#asset-container').removeClass('grid-cols-1 gap-3').addClass('grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4');
      });

      $('#btn-list-view').on('click', function() {
        $(this).addClass('text-primary bg-surface-container-high').removeClass('text-on-surface-variant');
        $('#btn-grid-view').removeClass('text-primary bg-surface-container-high').addClass('text-on-surface-variant');
        $('#asset-container').removeClass('grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4').addClass('grid-cols-1 gap-3');
      });

      // 预览按钮
      $('#asset-container').on('click', '.btn-preview', function() {
        const name = $(this).closest('.asset-card').data('name');
        console.log('预览资产:', name);
      });

      // 使用按钮
      $('#asset-container').on('click', '.btn-use', function() {
        const name = $(this).closest('.asset-card').data('name');
        console.log('使用资产:', name);
      });

      // 上传按钮
      $('#btn-upload').on('click', function() {
        // 上传资产功能：
        // 1. 打开文件选择对话框，支持多选图片/视频/音频文件
        // 2. 选择后显示上传进度列表
        // 3. 上传完成后自动提取文件信息（名称、大小、类型）
        // 4. 弹出编辑弹窗，允许补充标签、描述、分类等信息
        // 5. 确认后保存到资产库并刷新列表
        console.log('打开上传资产对话框');
      });

      // 过滤函数
      function filterAssets() {
        const activeTab = $('.tab-btn.text-primary').data('tab');
        const activeTags = $('.tag-btn.bg-primary').map(function() { return $(this).data('tag'); }).get();
        const searchText = $('#search-input').val().toLowerCase().trim();
        
        let visibleCount = 0;
        
        $('.asset-card').each(function() {
          const $card = $(this);
          const type = $card.data('type');
          const tags = ($card.data('tags') || '').split(',');
          const name = ($card.data('name') || '').toLowerCase();
          
          const tabMatch = activeTab === 'all' || type === activeTab;
          const tagMatch = activeTags.length === 0 || activeTags.some(tag => tags.includes(tag));
          const searchMatch = !searchText || name.includes(searchText);
          
          if (tabMatch && tagMatch && searchMatch) {
            $card.show();
            visibleCount++;
          } else {
            $card.hide();
          }
        });
        
        if (visibleCount === 0) {
          $('#empty-state').removeClass('hidden').addClass('flex');
        } else {
          $('#empty-state').addClass('hidden').removeClass('flex');
        }
      }
    });
  </script>
  
  <script>lucide.createIcons();</script>
