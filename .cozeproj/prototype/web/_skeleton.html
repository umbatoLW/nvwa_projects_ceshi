<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（科技蓝，参考Vidu/LibLib） === */
      --color-primary:              #0ABAB5;
      --color-primary-container:    #4DD4CF;
      --color-on-primary:           #FFFFFF;
      /* === 背景 / 表面（深色专业工具风） === */
      --color-background:                 #0A0A0A;
      --color-surface-container-lowest:   #0F0F0F;
      --color-surface:                    #141414;
      --color-surface-container:          #1A1A1A;
      --color-surface-container-high:     #222222;
      --color-surface-container-highest:  #2A2A2A;
      /* === 文字 === */
      --color-on-surface:           #F5F5F5;
      --color-on-surface-variant:   #888888;
      /* === 功能色 === */
      --color-success:  #22C55E;
      --color-error:    #EF4444;
      --color-warning:  #F59E0B;
      --color-info:     #33CCCC;
      /* === 边框 === */
      --color-outline:          #333333;
      --color-outline-variant:  #262626;
      /* === 圆角 === */
      --radius-sm:   0.5rem;
      --radius-md:   0.75rem;
      --radius-lg:   1rem;
      --radius-xl:   1.25rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-float:  0 8px 24px rgba(0,0,0,0.5);
      --shadow-dialog: 0 20px 50px rgba(0,0,0,0.6);
      /* === 字体 === */
      --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
  </style>

  <!-- 网点纹理背景 -->
  <style>
    .bg-dots {
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23141414"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central" fill="%230ABAB5">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%23888888" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段 -->

    </div>
  </header>

  <div class="flex pt-14" style="height: 100vh;">
    <!-- 左侧垂直导航（参考Vidu/LibLib） -->

          仪表盘
        </a>
        <a href="workspace.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-on-surface-variant hover:bg-surface-container hover:text-on-surface">
          <i data-lucide="workflow" class="w-4 h-4"></i>
          工作区
        </a>
        <a href="scripts.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-on-surface-variant hover:bg-surface-container hover:text-on-surface">

        </a>
        <a href="characters.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-on-surface-variant hover:bg-surface-container hover:text-on-surface">

        </a>
        <a href="assets.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-on-surface-variant hover:bg-surface-container hover:text-on-surface">

        <div class="pt-3 mt-3 border-t border-outline-variant/30 space-y-0.5">

    <!-- @main-content:start -->

      <!-- @main-content:end -->
    </main>
  </div>
  <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

  <script>lucide.createIcons();</script>
</body>
