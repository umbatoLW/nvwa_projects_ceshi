<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVWA 女娲 — 一念成剧 万象生辉</title>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #0ABAB5;
      --color-primary-container: #4DD4CF;
      --color-on-primary: #FFFFFF;
      --color-background: #0A0A0A;
      --color-surface: #141414;
      --color-surface-container-lowest: #0F0F0F;
      --color-surface-container: #1A1A1A;
      --color-surface-container-high: #222222;
      --color-surface-container-highest: #2A2A2A;
      --color-on-surface: #F5F5F5;
      --color-on-surface-variant: #888888;
      --color-outline: #333333;
      --color-outline-variant: #262626;
      --radius-full: 9999px;
      --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
  </style>
  <style>
    .video-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }
    .video-bg.active { opacity: 1; }
    .bottom-fade {
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.2) 40%, transparent 70%);
    }
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-float-1 { animation: floatUp 1s ease-out 0.3s both; }
    .animate-float-2 { animation: floatUp 1s ease-out 0.7s both; }
    .animate-float-3 { animation: floatUp 1s ease-out 1.1s both; }
    .btn-glow:hover {
      box-shadow: 0 0 24px rgba(10,186,181,0.45), 0 0 48px rgba(10,186,181,0.2);
    }
    .indicator-thumb {
      transition: all 0.3s ease;
      opacity: 0.35;
    }
    .indicator-thumb.active {
      opacity: 1;
      transform: scale(1.15);
      box-shadow: 0 0 0 2px #0ABAB5;
    }
  </style>
</head>
<body class="bg-background text-on-surface font-sans overflow-hidden">

  <!-- 视频背景层 -->
  <div class="fixed inset-0 z-0">
    <video class="video-bg active" autoplay muted loop playsinline poster="https://image01.vidu.zone/vidu/media-asset/sailboat-8eee19ce.webp">
      <source src="https://image01.vidu.zone/vidu/landing-page/sailboat.14774333.mp4" type="video/mp4">
    </video>
    <video class="video-bg" autoplay muted loop playsinline poster="https://image01.vidu.zone/vidu/media-asset/girl-2a1d4663.webp">
      <source src="https://image01.vidu.zone/vidu/landing-page/girl.6e936562.mp4" type="video/mp4">
    </video>
    <video class="video-bg" autoplay muted loop playsinline poster="https://image01.vidu.zone/vidu/media-asset/banner2-9da68e3f.webp">
      <source src="https://image01.vidu.zone/vidu/landing-page/banner2.c92f22ed.mp4" type="video/mp4">
    </video>
    <video class="video-bg" autoplay muted loop playsinline poster="https://image01.vidu.zone/vidu/media-asset/explosion-63d7069f.webp">
      <source src="https://image01.vidu.zone/vidu/landing-page/explosion.e0203d2f.mp4" type="video/mp4">
    </video>
    <video class="video-bg" autoplay muted loop playsinline poster="https://image01.vidu.zone/vidu/media-asset/banner3-3b5b55f3.webp">
      <source src="https://image01.vidu.zone/vidu/landing-page/banner3.64dda4ef.mp4" type="video/mp4">
    </video>
    <!-- 底部暗色遮罩 -->
    <div class="absolute inset-0 bottom-fade z-10 pointer-events-none"></div>
  </div>

  <!-- 右上角视频切换指示器 -->
  <div class="fixed right-5 top-1/2 -translate-y-1/2 z-30 flex flex-col items-center gap-3 hidden md:flex">
    <img data-idx="0" data-category="其他" class="indicator-thumb active w-9 h-9 rounded-lg object-cover cursor-pointer" src="https://image01.vidu.zone/vidu/media-asset/sailboat-8eee19ce.webp" alt="帆船视频封面">
    <img data-idx="1" data-category="其他" class="indicator-thumb w-7 h-7 rounded-lg object-cover cursor-pointer" src="https://image01.vidu.zone/vidu/media-asset/girl-2a1d4663.webp" alt="女孩视频封面">
    <img data-idx="2" data-category="其他" class="indicator-thumb w-7 h-7 rounded-lg object-cover cursor-pointer" src="https://image01.vidu.zone/vidu/media-asset/banner2-9da68e3f.webp" alt="横幅视频封面">
    <img data-idx="3" data-category="其他" class="indicator-thumb w-9 h-9 rounded-lg object-cover cursor-pointer" src="https://image01.vidu.zone/vidu/media-asset/explosion-63d7069f.webp" alt="爆炸视频封面">
    <img data-idx="4" data-category="其他" class="indicator-thumb w-7 h-7 rounded-lg object-cover cursor-pointer" src="https://image01.vidu.zone/vidu/media-asset/banner3-3b5b55f3.webp" alt="横幅视频封面2">
  </div>

  <!-- 左上角 Logo -->
  <header class="fixed top-6 left-8 z-30 animate-float-1">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
        <i data-lucide="sparkles" class="w-4 h-4 text-on-primary"></i>
      </div>
      <span class="font-bold text-lg tracking-tight text-white">NVWA</span>
    </div>
  </header>

  <!-- 中央内容 -->
  <main class="relative z-20 flex h-screen flex-col items-center justify-end pb-28 md:pb-36">
    <!-- Slogan 一行 -->
    <h1 class="animate-float-2 text-center text-white font-semibold leading-tight tracking-wide"
        style="font-size: clamp(36px, 6vw, 80px); text-shadow: 0 2px 12px rgba(0,0,0,0.5);">
      一念成剧&nbsp;&nbsp;&nbsp;&nbsp;万象生辉
    </h1>

    <!-- 立即创作按钮 -->
    <div class="animate-float-3 mt-10">
      <a href="workspace.html"
         class="btn-glow inline-flex items-center justify-center h-14 px-12 rounded-full bg-primary text-on-primary text-lg font-semibold transition-all duration-300 hover:scale-105 hover:bg-primary-container">
        立即创作
      </a>
    </div>
  </main>

  <script>
    // 视频轮播
    const videos = document.querySelectorAll('.video-bg');
    const thumbs = document.querySelectorAll('.indicator-thumb');
    let current = 0;
    const interval = 5000;

    function switchVideo(idx) {
      videos[current].classList.remove('active');
      thumbs[current]?.classList.remove('active');
      current = idx;
      videos[current].classList.add('active');
      thumbs[current]?.classList.add('active');
    }

    setInterval(() => {
      switchVideo((current + 1) % videos.length);
    }, interval);

    thumbs.forEach((thumb, idx) => {
      thumb.addEventListener('click', () => switchVideo(idx));
    });

    lucide.createIcons();
  </script>
</body>
</html>
